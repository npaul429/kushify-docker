services:
  web-main:
    build:
      context: ./app-main
      dockerfile: ../Dockerfile.main
    ports:
      - "3000:3000"
    volumes:
      - ./app-main:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  web-play:
    build:
      context: ./app-play
      dockerfile: ../Dockerfile.play
    ports:
      - "3001:3001"
    volumes:
      - ./app-play:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-main
      - web-play

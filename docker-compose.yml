services:
  pitchdeck:
    build:
      context: ./app-main
      dockerfile: ../Dockerfile.main
    volumes:
      - ./app-main:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  game:
    build:
      context: ./app-play
      dockerfile: ../Dockerfile.play
    volumes:
      - ./app-play:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pitchdeck
      - game
